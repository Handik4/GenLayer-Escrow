[pytest]
testpaths = tests/direct

# NOTE (environment workaround, not project code):
# This machine's Python 3.14 venv has unrelated packages (hydra/omegaconf and
# the genlayer network CLI plugin) that transitively import an old antlr4 doing
# `from typing.io import TextIO`, which was removed in Python 3.13+. Their pytest
# entrypoints crash on load. They are NOT needed for direct-mode contract tests
# (provided by the separate `gltest_direct` plugin), so we disable them here.
addopts = -p no:hydra_pytest -p no:gltest
